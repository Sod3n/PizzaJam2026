name: Deploy Server to VPS

on:
  workflow_dispatch:
  push:
    branches: [server]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sod3n/pizzajam-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:latest ./Server
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy on VPS
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.VPS_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

          docker stop pizzajam-server 2>/dev/null || true
          docker rm pizzajam-server 2>/dev/null || true

          docker run -d \
            --name pizzajam-server \
            --restart unless-stopped \
            -p 8080:8080 \
            -p 9050:9050/udp \
            -v pizzajam-desync-logs:/app/desync-logs \
            -e DESYNC_RECORDING=false \
            -e DESYNC_LOG_DIR=/app/desync-logs \
            -e LOG_LEVEL=Error \
            ghcr.io/${{ env.IMAGE_NAME }}:latest

          docker image prune -f > /dev/null 2>&1 || true
          EOF
