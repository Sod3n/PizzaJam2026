name: Deploy Server to VPS

on:
  workflow_dispatch:
  push:
    branches: [server]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pizzajam-server:latest ./Server

      - name: Transfer image to VPS
        run: |
          # Install sshpass for password auth
          sudo apt-get install -y sshpass

          # Save & transfer image
          docker save pizzajam-server:latest | gzip > /tmp/image.tar.gz
          sshpass -p "${{ secrets.VPS_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no \
            /tmp/image.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/image.tar.gz

      - name: Deploy on VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
          docker load < /tmp/image.tar.gz
          rm -f /tmp/image.tar.gz

          # Stop old container
          docker stop pizzajam-server 2>/dev/null || true
          docker rm pizzajam-server 2>/dev/null || true

          # Start new container
          docker run -d \
            --name pizzajam-server \
            --restart unless-stopped \
            -p 8080:8080 \
            -p 9050:9050/udp \
            pizzajam-server:latest

          # Cleanup old images
          docker image prune -f > /dev/null 2>&1 || true
          EOF
