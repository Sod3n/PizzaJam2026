name: Export Game

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot engine version (must match your project)'
        required: false
        default: '4.6.1'
      version:
        description: 'Build version label (used in artifact names)'
        required: false
        default: 'dev'

env:
  PROJECT_PATH: Client/Template.Godot

jobs:
  export:
    name: Export ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            preset: "Windows Desktop"
            output: "game.exe"
          - name: Linux
            preset: "Linux"
            output: "game.x86_64"
          - name: macOS
            preset: "macOS"
            output: "game.zip"
          - name: Android
            preset: "Android"
            output: "game.apk"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Setup Java 17
        if: matrix.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ inputs.godot_version }}
          use-dotnet: true
          include-templates: true

      - name: Fix autoload UID references for CI
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          # Autoloads use UIDs that may not resolve in CI (submodule UID mismatch).
          # Replace with file paths which always work.
          sed -i 's|Global="\*uid://c6aa26vlcpjcm"|Global="*res://global.gd"|' project.godot
          sed -i 's|DebugVisualizer="\*uid://d01xjuy2b0bpt"|DebugVisualizer="*res://addons/framework_tools/DebugVisualizer.cs"|' project.godot

      - name: Disable macOS code signing for CI
        if: matrix.name == 'macOS'
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          sed -i 's/codesign\/codesign=3/codesign\/codesign=0/' export_presets.cfg

      - name: Configure Android export
        if: matrix.name == 'Android'
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          # Generate a signing keystore in CI (fine for itch.io distribution)
          mkdir -p ~/.android
          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI Build,O=PizzaJam,C=US" 2>/dev/null

          # Point Godot at the Android SDK, Java, and keystore
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

          # Install Android build template (required for gradle build / C# export)
          TEMPLATES_DIR=$(find ~/.local/share/godot/export_templates -maxdepth 1 -type d -name "*.mono" | head -1)
          if [ -z "$TEMPLATES_DIR" ]; then
            TEMPLATES_DIR=$(find ~/.local/share/godot/export_templates -maxdepth 1 -type d | tail -1)
          fi
          echo "Using templates from: $TEMPLATES_DIR"
          mkdir -p android/build
          unzip -o "$TEMPLATES_DIR/android_source.zip" -d android/build/

          # Create version file (Godot checks this for gradle template)
          GODOT_VER="${{ inputs.godot_version }}.stable.mono"
          echo "$GODOT_VER" > android/.build_version
          echo "Build version: $GODOT_VER"

      - name: Install .NET Android workload
        if: matrix.name == 'Android'
        run: dotnet workload install android

      - name: Restore .NET packages
        run: dotnet restore
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Import Godot project
        run: godot --headless --import
        working-directory: ${{ env.PROJECT_PATH }}
        continue-on-error: true

      - name: Export ${{ matrix.name }}
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          mkdir -p build
          # Godot 4.6.1 crashes during shutdown after a successful export
          # (EditorSettings bug). Ignore exit code and verify output instead.
          godot --headless --export-release "${{ matrix.preset }}" "build/${{ matrix.output }}" || true

      - name: Verify export output
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          if [ ! -f "build/${{ matrix.output }}" ]; then
            echo "::error::Export failed - build/${{ matrix.output }} not found"
            exit 1
          fi
          echo "Export successful: $(ls -lh build/${{ matrix.output }})"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ inputs.version || 'dev' }}
          path: ${{ env.PROJECT_PATH }}/build/
          retention-days: 30
